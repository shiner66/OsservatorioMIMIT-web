services:
  osservaprezzi:
    build: .
    image: osservaprezzi-carburanti:latest
    container_name: osservaprezzi-carburanti
    restart: unless-stopped
    ports:
      - "8765:8765"
    # Cache CSV MIMIT in RAM: ~30 MB, si rigenera dopo ogni riavvio.
    tmpfs:
      - /tmp/carburanti:size=128M,mode=1777
    # environment:
    #   - PORT=8765
